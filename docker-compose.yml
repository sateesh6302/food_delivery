version: "3.8"
services:
 frontend:
  build: ./frontend
  container_name: food-frontend
  ports:
   - "80:5173"
  restart: unless-stopped
  depends_on:
   - backend
 backend:
  build: ./backend
  container_name: food-backend
  ports:
   - "4000:4000"
  restart: unless-stopped
  env_file:
   - ./backend/.env